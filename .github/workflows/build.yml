name: Build Hierarchical Engine

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Build for Linux
        run: |
          gcc -shared -fPIC -O3 \
            -I./sqlite \
            -I. \
            hierarchical_engine.c \
            yyjson.c \
            sqlite/sqlite3.c \
            -o hierarchical_engine.so \
            -lpthread -ldl -lm
        working-directory: hierarchical_engine  # ← ADICIONE ISSO
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: hierarchical_engine-linux
          path: hierarchical_engine/hierarchical_engine.so  # ← AJUSTE O PATH

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build for macOS
        run: |
          clang -dynamiclib -O3 \
            -I./sqlite \
            -I. \
            hierarchical_engine.c \
            yyjson.c \
            sqlite/sqlite3.c \
            -o hierarchical_engine.dylib \
            -undefined suppress -flat_namespace
        working-directory: hierarchical_engine  # ← ADICIONE ISSO
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hierarchical_engine-macos
          path: hierarchical_engine/hierarchical_engine.dylib  # ← AJUSTE O PATH

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build for Windows
        run: |
          cl /LD /O2 /I./sqlite /I. `
            hierarchical_engine.c `
            yyjson.c `
            sqlite/sqlite3.c `
            /Fehierarchical_engine.dll
        shell: pwsh
        working-directory: hierarchical_engine  # ← ADICIONE ISSO
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hierarchical_engine-windows
          path: hierarchical_engine/hierarchical_engine.dll  # ← AJUSTE O PATH