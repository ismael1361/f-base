name: Build Hierarchical Engine

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Build for Linux
        run: |
          gcc -shared -fPIC -O3 \
            -I./sqlite \
            -I. \
            hierarchical_engine.c \
            yyjson.c \
            sqlite/sqlite3.c \
            -o hierarchical_engine.so \
            -lpthread -ldl -lm
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: hierarchical_engine-linux
          path: hierarchical_engine.so

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build for macOS
        run: |
          clang -dynamiclib -O3 \
            -I./sqlite \
            -I. \
            hierarchical_engine.c \
            yyjson.c \
            sqlite/sqlite3.c \
            -o hierarchical_engine.dylib \
            -undefined suppress -flat_namespace
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hierarchical_engine-macos
          path: hierarchical_engine.dylib

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build for Windows
        run: |
          cl /LD /O2 /I./sqlite /I. `
            hierarchical_engine.c `
            yyjson.c `
            sqlite/sqlite3.c `
            /Fehierarchical_engine.dll
        shell: pwsh
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hierarchical_engine-windows
          path: hierarchical_engine.dll

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/hierarchical_engine-linux/hierarchical_engine.so
            artifacts/hierarchical_engine-macos/hierarchical_engine.dylib
            artifacts/hierarchical_engine-windows/hierarchical_engine.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}